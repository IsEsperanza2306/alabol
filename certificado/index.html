<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/logo-circular.png" type="image/png">
<title>Verificacion Vehicular | Alabol Car Broker</title>
<meta name="description" content="Consulta el reporte de verificacion vehicular de Alabol Car Broker.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
:root {
  --bg-dark: #0a1f1a;
  --bg-panel: rgba(13, 38, 28, 0.6);
  --panel-border: rgba(212, 175, 55, 0.18);
  --brand-gold-start: #f9e27b;
  --brand-gold-end: #d4af37;
  --brand-gold-glow: rgba(212, 175, 55, 0.4);
  --cyber-green: #34d399;
  --cyber-green-glow: rgba(52, 211, 153, 0.3);
  --cyber-grid: rgba(13, 148, 136, 0.05);
  --text-main: #ffffff;
  --text-muted: #a8c5b8;
  --font-heading: 'Poppins', sans-serif;
  --font-body: 'Poppins', sans-serif;
  --font-cyber: 'Share Tech Mono', monospace;
  --danger: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--bg-dark);
  background-image: linear-gradient(var(--cyber-grid) 1px, transparent 1px), linear-gradient(90deg, var(--cyber-grid) 1px, transparent 1px), radial-gradient(circle at 50% -20%, rgba(212,175,55,0.1), transparent 50%);
  background-size: 40px 40px, 40px 40px, 100% 100%;
  color: var(--text-main); font-family: var(--font-body); font-size: 14px; line-height: 1.6;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
}
.gold-gradient-text { background: linear-gradient(135deg, var(--brand-gold-start), var(--brand-gold-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Search bar */
.search-bar { width: 100%; max-width: 900px; margin-bottom: 30px; display: flex; gap: 10px; }
.search-bar input { flex: 1; padding: 14px 18px; border-radius: 14px; background: rgba(10,31,26,0.6); border: 1px solid var(--panel-border); color: white; font-family: var(--font-cyber); font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
.search-bar input:focus { outline: none; border-color: var(--brand-gold-end); box-shadow: 0 0 16px rgba(212,175,55,0.15); }
.search-bar input::placeholder { color: var(--text-muted); text-transform: none; font-family: var(--font-body); letter-spacing: normal; font-size: 14px; }
.search-bar button { padding: 14px 28px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--brand-gold-start), var(--brand-gold-end)); color: #000; font-weight: 800; font-size: 14px; cursor: pointer; white-space: nowrap; }
.search-bar button:hover { box-shadow: 0 0 20px var(--brand-gold-glow); }

/* Page Container */
.page-container { width: 100%; max-width: 900px; margin-bottom: 50px; background: rgba(13, 38, 28, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--panel-border); border-radius: 24px; padding: 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,175,55,0.08); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
.header::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100px; height: 2px; background: linear-gradient(90deg, var(--brand-gold-start), var(--brand-gold-end)); box-shadow: 0 0 10px var(--brand-gold-glow); }
.brand-title { font-family: var(--font-heading); font-weight: 900; font-size: 28px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
.report-subtitle { font-family: var(--font-cyber); color: var(--cyber-green); letter-spacing: 1px; font-size: 12px; margin-top: 5px; opacity: 0.8; }

.qr-verification { display: flex; align-items: center; gap: 15px; background: rgba(212,175,55,0.04); border: 1px solid var(--panel-border); padding: 10px 15px; border-radius: 12px; }
.qr-box { position: relative; padding: 5px; background: #fff; border-radius: 8px; }
.qr-box img { display: block; width: 65px; height: 65px; }
.qr-box::before, .qr-box::after { content: ''; position: absolute; width: 10px; height: 10px; }
.qr-box::before { top: -4px; left: -4px; border-top: 2px solid var(--brand-gold-end); border-left: 2px solid var(--brand-gold-end); }
.qr-box::after { bottom: -4px; right: -4px; border-bottom: 2px solid var(--brand-gold-end); border-right: 2px solid var(--brand-gold-end); }
.qr-text { display: flex; flex-direction: column; }
.scan-title { font-family: var(--font-heading); font-size: 12px; font-weight: 700; color: var(--brand-gold-start); text-transform: uppercase; }
.scan-desc { font-size: 10px; color: var(--text-muted); }

.grid-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; margin-bottom: 30px; }
.span-full { grid-column: 1 / -1; }
.panel { background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); }
.panel-header { font-family: var(--font-heading); font-size: 13px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
.panel-header::before { content: ''; width: 8px; height: 8px; background: var(--brand-gold-start); border-radius: 50%; box-shadow: 0 0 8px var(--brand-gold-glow); }

.identity-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.data-group { display: flex; flex-direction: column; gap: 5px; }
.data-group label { font-family: var(--font-cyber); font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
.data-group .value { font-size: 16px; font-weight: 600; }
.plate-box { background: rgba(255,255,255,0.9); color: #0a1f1a; font-family: var(--font-heading); font-weight: 800; padding: 4px 12px; border-radius: 6px; border: 2px solid rgba(212,175,55,0.4); display: inline-block; }

.score-hud { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
.score-circle-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
.score-circle-container svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
.score-hud-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
.score-hud-track { fill: none; stroke: rgba(212,175,55,0.1); stroke-width: 12; }
.score-hud-progress { fill: none; stroke: url(#goldGradient); stroke-width: 12; stroke-linecap: round; filter: drop-shadow(0 0 10px var(--brand-gold-glow)); stroke-dasharray: 502; stroke-dashoffset: 502; }
.score-center { text-align: center; z-index: 2; position: absolute; }
.huge-grade { font-family: var(--font-heading); font-size: 48px; font-weight: 900; line-height: 1; }
.score-center .label { font-family: var(--font-cyber); font-size: 12px; color: var(--brand-gold-start); letter-spacing: 2px; margin-top: 5px; }

.status-badge { position: absolute; top: -15px; right: 25px; background: rgba(212,175,55,0.08); border: 1px solid var(--brand-gold-start); color: var(--brand-gold-start); padding: 6px 15px; border-radius: 20px; font-family: var(--font-heading); font-size: 11px; font-weight: 800; box-shadow: 0 4px 16px rgba(212,175,55,0.15); z-index: 3; }
.status-badge.green { background: rgba(52,211,153,0.08); border-color: var(--cyber-green); color: var(--cyber-green); }
.status-badge.red { background: rgba(239,68,68,0.08); border-color: var(--danger); color: var(--danger); }

.terminal-hud { background: rgba(10,31,26,0.8); border: 1px solid var(--panel-border); border-radius: 12px; padding: 20px; font-family: var(--font-cyber); color: var(--cyber-green); position: relative; overflow: hidden; }
.t-line { display: flex; margin-bottom: 8px; font-size: 13px; }
.t-line .prefix { opacity: 0.5; margin-right: 15px; }
.t-line.success .status { color: var(--cyber-green); margin-right: 10px; }
.t-line.error .status { color: var(--danger); margin-right: 10px; }
.t-line.pending .status { color: var(--text-muted); margin-right: 10px; }

.checklist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: rgba(10,31,26,0.6); border-radius: 12px; border: 1px solid rgba(212,175,55,0.08); font-size: 13px; font-weight: 500; }
.check-item .icon { font-size: 16px; }
.check-item.ok .icon { color: var(--cyber-green); }
.check-item.obs { border-color: rgba(212,175,55,0.3); }
.check-item.obs .icon { color: var(--brand-gold-start); }
.check-item.fail { border-color: rgba(255,51,102,0.3); }
.check-item.fail .icon { color: #ff3366; }

.footer { display: flex; justify-content: space-between; align-items: center; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); font-family: var(--font-cyber); font-size: 12px; color: var(--text-muted); flex-wrap: wrap; gap: 10px; }
.footer strong { color: var(--text-main); font-weight: normal; }
.golden-tag { color: var(--brand-gold-start); border: 1px solid var(--brand-gold-start); padding: 2px 8px; border-radius: 4px; font-size: 11px; }

.photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 220px; gap: 20px; margin-bottom: 30px; }
.photo-card { background: var(--bg-dark); border: 1px solid var(--panel-border); border-radius: 16px; position: relative; overflow: hidden; }
.photo-card img { width: 100%; height: 100%; object-fit: cover; }
.photo-card::after { content: ''; position: absolute; top: 10px; right: 10px; bottom: 10px; left: 10px; border: 1px solid rgba(255,255,255,0.05); pointer-events: none; }
.photo-hud-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 12px; font-family: var(--font-cyber); color: var(--brand-gold-start); font-size: 13px; border-top: 1px solid rgba(212,175,55,0.2); display: flex; justify-content: space-between; }
.photo-hud-label .timestamp { color: var(--cyber-green); opacity: 0.7; }
.photo-hud-label .timestamp.obs { color: var(--brand-gold-start); }
.photo-hud-label .timestamp.fail { color: #ff3366; }

.download-bar { width: 100%; max-width: 900px; text-align: center; margin-bottom: 30px; }
.download-bar button { padding: 14px 32px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--brand-gold-start), var(--brand-gold-end)); color: var(--bg-dark); font-family: var(--font-heading); font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(212,175,55,0.35); }
.download-bar button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,175,55,0.5); }

/* Loading / Not found */
.loading { text-align: center; padding: 80px 20px; color: var(--brand-gold-start); font-family: var(--font-cyber); }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2); border-top-color: var(--brand-gold-start); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.not-found { text-align: center; padding: 80px 20px; }
.not-found h2 { font-family: var(--font-heading); font-size: 24px; color: var(--text-main); margin-bottom: 10px; }
.not-found p { color: var(--text-muted); }

.notas-section { background: rgba(212,175,55,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 16px; margin-top: 15px; }
.notas-section h4 { font-family: var(--font-cyber); font-size: 11px; color: var(--brand-gold-start); margin-bottom: 8px; text-transform: uppercase; }
.notas-section p { font-size: 13px; color: var(--text-muted); }

/* Legal Disclaimers */
.legal-disclaimers { width: 100%; max-width: 900px; margin-bottom: 40px; }
.disclaimer-block { background: rgba(13,38,28,0.4); border: 1px solid rgba(212,175,55,0.1); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; }
.disclaimer-block h4 { font-family: var(--font-heading); font-size: 10px; font-weight: 800; color: var(--brand-gold-start); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.disclaimer-block p { font-size: 11px; color: var(--text-muted); line-height: 1.7; margin-bottom: 6px; }
.disclaimer-block p:last-child { margin-bottom: 0; }
.disclaimer-block strong { color: #fff; }
.disclaimer-block a { color: var(--brand-gold-start); text-decoration: none; }
.disclaimer-block a:hover { text-decoration: underline; }
.disclaimer-links { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; padding: 12px 0; font-size: 11px; }
.disclaimer-links a { color: var(--brand-gold-start); text-decoration: none; font-weight: 600; }
.disclaimer-links a:hover { text-decoration: underline; }
.disclaimer-links span { color: var(--text-muted); opacity: 0.6; }

@media (max-width: 700px) {
  body { padding: 20px 12px; }
  .page-container { padding: 20px; border-radius: 16px; }
  .header { flex-direction: column; align-items: flex-start; gap: 15px; }
  .brand-title { font-size: 20px; }
  .grid-layout { grid-template-columns: 1fr; }
  .checklist-grid { grid-template-columns: repeat(2, 1fr); }
  .photo-grid { grid-template-columns: 1fr; grid-auto-rows: 180px; }
  .score-circle-container { width: 160px; height: 160px; }
  .huge-grade { font-size: 38px; }
  .search-bar { flex-direction: column; }
  .qr-verification { display: none; }
}
@media print {
  @page { size: A4 portrait; margin: 0; }
  body { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 0; }
  .search-bar, .download-bar { display: none !important; }
  .page-container { max-width: 100%; margin: 0; border: none; border-radius: 0; page-break-after: always; padding: 10mm 15mm; }
}
</style>
</head>
<body>

<!-- Search -->
<div class="search-bar">
  <input type="text" id="folio-input" placeholder="Ingresa el folio de verificacion" maxlength="12" autocomplete="off">
  <button onclick="buscarFolio()">VERIFICAR</button>
</div>

<div id="report-area">
  <div class="loading" id="initial-msg" style="display:none">
    <div class="spinner"></div>
    <p>Buscando reporte...</p>
  </div>
</div>

<script>
var SITE = 'https://alabolcar.com.mx';
var BUCKET = 'verificaciones';

  var SEMAFORO_LABELS = {
    documentos_completos: 'Doc. Completos', vin_valido: 'NIV Consistente', vin_no_remarcado: 'Sin Remarcado',
    placas_vigentes: 'Placas Vigentes', sin_reporte_robo: 'Reporte Robo', factura_original: 'Factura / Carta',
    tarjeta_circulacion: 'Tarjeta Circ.', chip_repuve: 'Chip REPUVE', numero_motor: 'Num. Motor',
    condicion_exterior: 'Cond. Exterior', pintura_original: 'Pintura Original', estructura_integra: 'Intr. Estructural'
  };
  var PHOTO_LABELS = { niv_tablero: 'NIV EN TABLERO', niv_chasis: 'NIV EN CHASIS', numero_motor: 'NUMERO DE MOTOR', chip_repuve: 'CHIP REPUVE', tarjeta_circulacion: 'TARJETA CIRCULACION', factura: 'FACTURA / CARTA FACTURA' };

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Init Supabase directly — no dependency on config.js
  var sb;
  try {
    sb = window.supabaseClient || (window.supabase && window.supabase.createClient(
      'https://rgnunjngtsgqgvplawfr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnbnVuam5ndHNncWd2cGxhd2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODcxMjksImV4cCI6MjA4ODE2MzEyOX0.8gd4XNoBI2mwbV54cORvVGOmJVwdzEidti38AcsqhB8'
    ));
    if (sb) window.supabaseClient = sb;
  } catch(e) { sb = null; }

  if (!sb) {
    document.getElementById('report-area').innerHTML = '<div class="not-found"><h2>Error de conexion</h2><p>No se pudo conectar con el servidor. Recarga la pagina e intenta de nuevo.</p></div>';
  }

  // Check URL for folio
  var pathParts = location.pathname.split('/').filter(Boolean);
  var initialFolio = (pathParts.length >= 2 && pathParts[0] === 'certificado' && pathParts[1].startsWith('ALB')) ? pathParts[1].toUpperCase() : null;
  var paramFolio = new URLSearchParams(location.search).get('folio');
  if (initialFolio || paramFolio) {
    document.getElementById('folio-input').value = initialFolio || paramFolio;
    setTimeout(buscarFolio, 300);
  }

  function buscarFolio() {
    var folio = (document.getElementById('folio-input').value || '').trim().toUpperCase().replace(/[^A-Z0-9\-]/g, '');
    if (!folio) return;
    var area = document.getElementById('report-area');
    area.innerHTML = '<div class="loading"><div class="spinner"></div><p>Buscando reporte...</p></div>';

    sb.from('verificaciones').select('*').eq('folio', folio).limit(1).then(function(res) {
      if (res.error || !res.data || !res.data.length) {
        area.innerHTML = '<div class="not-found"><h2>Reporte no encontrado</h2><p>El folio "' + esc(folio) + '" no existe o aun esta en proceso.</p></div>';
        return;
      }
      renderReport(res.data[0], area);
    });
  };

  document.getElementById('folio-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') buscarFolio(); });

  function renderReport(v, area) {
    var sem = v.semaforo || {};
    var auto = v.resultados_automaticos || {};
    var checks = auto.checks || {};
    var fotos = v.fotos || {};
    var resultado = v.resultado_final || 'pendiente';

    // Score calc
    var verdes = 0, amarillos = 0, rojos = 0;
    Object.values(sem).forEach(function(val) { if (val==='verde') verdes++; else if (val==='amarillo') amarillos++; else if (val==='rojo') rojos++; });
    var score = verdes + amarillos * 0.5;
    var pct = Math.round((score / 12) * 100);
    var dashOffset = 502 - (502 * pct / 100);

    var statusEmoji = resultado === 'aprobado' ? '🟢' : resultado === 'aprobado_con_observaciones' ? '🟡' : resultado === 'no_aprobado' ? '🔴' : '⏳';
    var statusText = resultado === 'aprobado' ? 'GREEN FLAGS' : resultado === 'aprobado_con_observaciones' ? 'YELLOW FLAGS' : resultado === 'no_aprobado' ? 'RED FLAGS' : 'EN PROCESO';
    var badgeClass = resultado === 'aprobado' ? 'green' : resultado === 'no_aprobado' ? 'red' : '';
    var tierLabel = v.tier === 'basico' ? 'ESCUDO' : v.tier === 'verificado' ? 'ESCUDO PRO' : 'ESCUDO TOTAL';

    // Terminal lines
    var terminalHtml = '';
    var termLines = [
      { code: '01', label: 'Numero de serie (NIV) verificado', ok: checks.vin_checksum && checks.vin_checksum.valid },
      { code: '02', label: 'Datos del fabricante consultados', ok: checks.nhtsa && checks.nhtsa.success },
      { code: '03', label: 'Marca, modelo y ano coinciden', ok: checks.cross_reference && checks.cross_reference.match, fail: checks.cross_reference && !checks.cross_reference.match },
      { code: '04', label: 'Consulta en registro de vehiculos robados', ok: checks.repuve && checks.repuve.status === 'limpio', pending: !checks.repuve || checks.repuve.status === 'pendiente' },
      { code: '05', label: 'Revision fotografica por perito', ok: checks.ai_analysis && checks.ai_analysis.success }
    ];
    termLines.forEach(function(t) {
      var cls = t.ok ? 'success' : t.fail ? 'error' : t.pending ? 'pending' : 'error';
      var status = t.ok ? '[OK]' : t.fail ? '[!]' : t.pending ? '[...]' : '[!]';
      var suffix = t.ok ? '— Aprobado' : t.fail ? '— Requiere atencion' : t.pending ? '— En proceso' : '— Por revisar';
      terminalHtml += '<div class="t-line ' + cls + '"><span class="prefix">' + t.code + '</span><span class="status">' + status + '</span><span>' + esc(t.label) + ' ' + suffix + '</span></div>';
    });

    // Checklist
    var checklistHtml = '';
    Object.keys(SEMAFORO_LABELS).forEach(function(key) {
      var val = sem[key] || 'pendiente';
      var cls = val === 'verde' ? 'ok' : val === 'rojo' ? 'fail' : 'obs';
      var icon = val === 'verde' ? '✓' : val === 'rojo' ? '✗' : '⚠️';
      checklistHtml += '<div class="check-item ' + cls + '"><span class="icon">' + icon + '</span> ' + SEMAFORO_LABELS[key] + '</div>';
    });

    // Photos
    var photosHtml = '';
    var photoKeys = ['niv_tablero', 'niv_chasis', 'numero_motor', 'chip_repuve', 'tarjeta_circulacion', 'factura'];
    photoKeys.forEach(function(key) {
      var path = fotos[key];
      var semKey = key === 'niv_tablero' ? 'vin_valido' : key === 'niv_chasis' ? 'vin_no_remarcado' : key;
      var pVal = sem[semKey] || 'pendiente';
      var statusLabel = pVal === 'verde' ? 'VERIFIED' : pVal === 'rojo' ? 'ALERT' : 'OBSERVATION';
      var statusCls = pVal === 'verde' ? '' : pVal === 'rojo' ? 'fail' : 'obs';
      var imgHtml = '';
      if (path) {
        var urlRes = sb.storage.from(BUCKET).getPublicUrl(path);
        imgHtml = '<img src="' + (urlRes.data ? urlRes.data.publicUrl : '') + '" alt="' + esc(PHOTO_LABELS[key]) + '">';
      }
      photosHtml += '<div class="photo-card">' + imgHtml + '<div class="photo-hud-label"><span>' + PHOTO_LABELS[key] + '</span><span class="timestamp ' + statusCls + '">' + statusLabel + '</span></div></div>';
    });

    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(SITE + '/certificado/' + v.folio);

    var html =

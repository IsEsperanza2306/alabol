    <style>
        :root {
            --emerald-deep: #0a1f1a;
            --emerald-light: #143d33;
            --gold-premium: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--emerald-deep);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(20, 148, 136, 0.15) 0%, transparent 70%);
            z-index: 0;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
            text-align: center;
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-area {
            margin-bottom: 30px;
            position: relative;
            width: 100px;
            height: 100px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo-area::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: logoGlowPulse 3s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes logoGlowPulse {
            0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%,-50%) scale(1.15); opacity: 0.9; }
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--gold-glow));
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: var(--gold-premium);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold-premium);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--gold-premium);
            border: none;
            border-radius: 12px;
            color: var(--emerald-deep);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            filter: brightness(1.1);
        }

        .toggle-mode {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .toggle-mode a {
            color: var(--gold-premium);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        /* Success screen animation override */
        .success-checkmark {
            display: none;
            color: #25D366;
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

                Continuar con Google

            <button type="button" id="btnFacebook"

                <i class="fa-brands fa-facebook-f" style="font-size:18px;"></i>
                Continuar con Facebook
            </button>

            <div style="display:flex; align-items:center; margin-bottom:15px; opacity:0.6;">
                <div style="flex:1; height:1px; background:var(--gold-premium);"></div>
                <div style="padding:0 10px; font-size:0.8rem; color:white; text-transform:uppercase;">o regístrate con
                    tu email</div>
                <div style="flex:1; height:1px; background:var(--gold-premium);"></div>
            </div>

            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="fullName">Nombre Completo</label>
                    <input type="text" id="fullName" placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group" id="whatsappGroup" style="display:none;">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="55 1234 5678">
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Entrar</button>
            </form>

            <div class="toggle-mode">
                <span id="toggleText">¿No tienes cuenta?</span>
                <a href="#" id="toggleBtn">Regístrate aquí</a>
            </div>
        </div>

        <!-- Success Result -->
        <div id="successContent" style="display:none;">
            <div class="success-checkmark">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h1 id="successMsg">¡Acceso Concedido!</h1>
            <p class="subtitle">Redirigiendo a tu Búnker Personal...</p>
        </div>
    </div>

    <script>
// ── RECOVERY PASSWORD HANDLER ──
(async function handleRecovery() {
  const hash = window.location.hash;
  if (!hash.includes('type=recovery')) return;

  const params = new URLSearchParams(hash.substring(1));
  const accessToken = params.get('access_token');
  if (!accessToken) return;

  const client = window.supabaseClient;
  if (!client) return;

  await client.auth.setSession({ access_token: accessToken, refresh_token: params.get('refresh_token') || '' });

  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                background:linear-gradient(135deg,#0a1f1a,#0d2921);font-family:'Poppins',sans-serif;padding:20px;">
      <div style="background:rgba(15,51,41,0.8);border:1px solid rgba(212,175,55,0.3);
                  border-radius:24px;padding:40px;width:100%;max-width:420px;text-align:center;">
        <img src="logo-circular.png" style="width:64px;height:64px;margin-bottom:20px;object-fit:contain;">
        <h1 style="font-size:22px;font-weight:800;color:#d4af37;margin-bottom:8px;">Nueva Contraseña</h1>
        <p style="color:#a8c5b8;font-size:13px;margin-bottom:28px;">Elige una contraseña segura para tu cuenta Alabol.</p>
        <input id="newPwd" type="password" placeholder="Nueva contraseña (mín. 8 caracteres)"
          style="width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(212,175,55,0.3);
                 color:white;padding:14px 16px;border-radius:12px;font-family:'Poppins',sans-serif;
                 font-size:14px;outline:none;margin-bottom:12px;">
        <input id="confirmPwd" type="password" placeholder="Confirmar contraseña"
          style="width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(212,175,55,0.3);
                 color:white;padding:14px 16px;border-radius:12px;font-family:'Poppins',sans-serif;
                 font-size:14px;outline:none;margin-bottom:20px;">
        <p id="pwdError" style="color:#fca5a5;font-size:12px;margin-bottom:12px;display:none;"></p>
        <button onclick="updatePassword()"
          style="width:100%;background:linear-gradient(135deg,#d4af37,#c9a961);color:#0a1f1a;
                 border:none;padding:14px;border-radius:12px;font-family:'Poppins',sans-serif;
                 font-size:15px;font-weight:700;cursor:pointer;">
          Guardar Contraseña
        </button>
      </div>
    </div>`;

  if (!document.querySelector('link[href*="Poppins"]')) {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap';
    document.head.appendChild(link);
  }

  window.updatePassword = async function() {
    const pwd = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;
    const err = document.getElementById('pwdError');

    if (pwd.length < 8) { err.textContent = 'La contraseña debe tener al menos 8 caracteres'; err.style.display='block'; return; }
    if (pwd !== confirm) { err.textContent = 'Las contraseñas no coinciden'; err.style.display='block'; return; }

    const { error } = await client.auth.updateUser({ password: pwd });
    if (error) { err.textContent = 'Error: ' + error.message; err.style.display='block'; return; }

    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                  background:linear-gradient(135deg,#0a1f1a,#0d2921);font-family:'Poppins',sans-serif;">
        <div style="text-align:center;color:white;">
          <div style="font-size:64px;margin-bottom:16px;">✅</div>
          <h2 style="color:#d4af37;font-size:24px;margin-bottom:8px;">¡Contraseña actualizada!</h2>
          <p style="color:#a8c5b8;margin-bottom:24px;">Ya puedes iniciar sesión con tu nueva contraseña.</p>
          <a href="index.html" style="background:linear-gradient(135deg,#d4af37,#c9a961);color:#0a1f1a;
             padding:12px 28px;border-radius:20px;text-decoration:none;font-weight:700;">
            Ir al inicio
          </a>
        </div>
      </div>`;
  };
})();

        // --- 0. CHECK EXISTING SESSION (OAuth callback) ---
        // Support ?redirect= param to return users to where they came from
        function getRedirectTarget() {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect') || 'vendedor.html';
        }

        (async function() {
            const sb = getSB();
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = getRedirectTarget();
                return;
            }
        })();

        // --- 1. UI TOGGLE LOGIC ---
        let isLogin = true;

        window.onload = function () {
            const authForm = document.getElementById('authForm');
            const toggleBtn = document.getElementById('toggleBtn');
            const errorBox = document.getElementById('errorBox');

            console.log('DOM Cargado. Buscando toggleBtn:', toggleBtn);

            if (toggleBtn) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    isLogin = !isLogin;

                    const nameGroup = document.getElementById('nameGroup');
                    const whatsappGroup = document.getElementById('whatsappGroup');
                    const authTitle = document.getElementById('authTitle');
                    const authSubtitle = document.getElementById('authSubtitle');
                    const submitBtn = document.getElementById('submitBtn');
                    const toggleText = document.getElementById('toggleText');

                    if (nameGroup) nameGroup.style.display = isLogin ? 'none' : 'block';
                    if (whatsappGroup) whatsappGroup.style.display = isLogin ? 'none' : 'block';
                    if (authTitle) authTitle.textContent = isLogin ? 'Bienvenido al Club' : 'Crea tu Perfil VIP';
                    if (authSubtitle) authSubtitle.textContent = isLogin ? 'Tu pasaporte VIP al mundo de los autos certificados.' : 'Únete a la red más exclusiva de CDMX.';
                    if (submitBtn) submitBtn.textContent = isLogin ? 'Entrar' : 'Registrarme';
                    if (toggleText) toggleText.textContent = isLogin ? '¿No tienes cuenta?' : '¿Ya eres miembro?';

                    toggleBtn.textContent = isLogin ? 'Regístrate aquí' : 'Inicia sesión';
                    errorBox.style.display = 'none';
                    console.log('Modo cambiado exitosamente a:', isLogin ? 'Login' : 'Registro');
                });
            } else {
                console.error('CRÍTICO: No habia toggleBtn en el DOM.');
            }
        };

        // --- 2. SUPABASE INITIALIZATION ---
        function getSB() {
            return window.supabaseClient || null;
        }

        // --- 3. AUTH SUBMISSION ---
        const authForm = document.getElementById('authForm');
        const errorBox = document.getElementById('errorBox');
        const oauthRedirect = window.location.origin + '/' + getRedirectTarget();

        async function oauthLogin(provider) {
            const sb = getSB();
            if (!sb) {
                errorBox.textContent = 'Error de conexión con el servidor. Recarga la página.';
                errorBox.style.display = 'block';
                return;
            }
            try {
                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: oauthRedirect }
                });
                if (error) throw error;
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
            }
        }

        document.getElementById('btnGoogle').addEventListener('click', () => oauthLogin('google'));
        document.getElementById('btnFacebook').addEventListener('click', () => oauthLogin('facebook'));

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const sb = getSB();
            if (!sb) {
                errorBox.textContent = "Error de conexión con el servidor. Por favor recarga la página.";
                errorBox.style.display = 'block';
                return;
            }

            errorBox.style.display = 'none';
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'PROCESANDO...';
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                let result;
                if (isLogin) {
                    result = await sb.auth.signInWithPassword({ email, password });
                } else {
                    const fullName = document.getElementById('fullName').value;
                    const whatsapp = document.getElementById('whatsapp').value;
                    result = await sb.auth.signUp({
                        email,
                        password,
                        options: {
                            data: { full_name: fullName, whatsapp: whatsapp }
                        }
                    });
                }

                if (result.error) throw result.error;

                // Success Flow
                document.getElementById('authContent').style.display = 'none';
                const successContent = document.getElementById('successContent');
                successContent.style.display = 'block';
                document.querySelector('.success-checkmark').style.display = 'block';

                if (!isLogin && result.data.user && result.data.session === null) {
                    document.getElementById('successMsg').textContent = '¡Casi listo!';
                    successContent.querySelector('.subtitle').textContent = 'Revisa tu email para confirmar tu cuenta y activar tu Búnker.';
                } else {
                    setTimeout(() => {
                        window.location.href = getRedirectTarget();
                    }, 2000);
                }

            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
